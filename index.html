<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cromo Vision Pro</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#39d353">
</head>
<body>

    <div id="apiKeyModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="color: #39d353; margin:0;">🔑 Configuración API</h3>
            <p style="color: #8b949e; font-size: 13px;">Introduce tu clave de Google AI Studio. Solo se guarda en este dispositivo.</p>
            <input type="password" id="apiKeyInput" placeholder="Pega tu clave aquí...">
            <button id="saveKeyBtn" class="action-btn" style="margin-top: 5px;">GUARDAR Y EMPEZAR</button>
            <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: #39d353; font-size: 11px; text-decoration: none;">¿No tienes clave? Consíguela gratis aquí</a>
        </div>
    </div>

    <div class="container">
        <h1>⚽ Cromo Vision Total</h1>
        
        <div class="upload-section">
            <div class="button-group">
                <input type="file" id="imageInput" accept="image/*" hidden>
                <label for="imageInput" class="custom-button">📂 GALERÍA</label>
                <button id="openCameraBtn" class="custom-button secondary">📷 CÁMARA</button>
            </div>

            <div id="cameraContainer" style="display: none;">
                <video id="cameraFeed" autoplay playsinline></video>
                <button id="captureBtn" class="capture-button">🔴 CAPTURAR</button>
            </div>

            <div id="previewContainer">
                <div id="scanLine" class="scanning-line" style="display: none;"></div>
                <img id="imagePreview" src="" alt="Vista previa" style="display: none;">
            </div>
        </div>

        <button id="searchButton" class="action-btn" disabled>⚡ ANALIZAR VALOR REAL</button>
        <p id="statusText" style="text-align: center; margin-top: 10px; font-size: 14px; font-weight: bold;"></p>

        <div id="infoCard" style="display: none;">
            <div style="text-align: center; margin-bottom: 15px;">
                <h2 id="dataJugador" style="margin:0;"></h2>
                <span id="dataTipo" style="background:#238636; padding:3px 8px; border-radius:10px; font-size:12px;"></span>
            </div>
            <p id="dataColeccion" style="text-align: center; color: #8b949e; font-size: 14px; margin-bottom: 10px;"></p>
            
            <div id="precioMedio" class="price-main"></div>

            <div class="platform-breakdown">
                <div class="platform-row"><span>Wallapop</span><span id="pWallapop">-</span></div>
                <div class="platform-row"><span>eBay</span><span id="pEbay">-</span></div>
                <div class="platform-row"><span>Todocolección</span><span id="pTodo">-</span></div>
                <div class="platform-row"><span>Fanatics</span><span id="pFanatics">-</span></div>
            </div>

            <div class="market-grid">
                <button id="btnWallapop" class="mkt-btn wal">Wallapop</button>
                <button id="btnEbay" class="mkt-btn eby">eBay</button>
                <button id="btnTodo" class="mkt-btn tdc">TodoCol</button>
                <button id="btnFanatics" class="mkt-btn fnc">Fanatics</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        }
    </script>
</body>
</html>
